<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aale AI Analytics PRO</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0f19;
    color:white;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#111827;
    border-bottom:1px solid #1f2937;
}

.brand{
    font-size:20px;
    font-weight:bold;
    color:#3b82f6;
}

.status{
    color:#22c55e;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 110px);
}

/* CONTROL PANEL */
.control-panel{
    width:24%;
    padding:15px;
    background:#1f2937;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#0b1220;
    color:white;
}

/* BUTTONS */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

/* GRAPH */
.graph-panel{
    width:76%;
    padding:15px;
}

/* AI BOX */
.ai-box{
    margin-top:15px;
    padding:15px;
    background:#0f172a;
    border:1px solid #1f2937;
    border-radius:10px;
}

.ai-title{
    color:#22d3ee;
    margin-bottom:10px;
}

.footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px;
    background:#111827;
    border-top:1px solid #1f2937;
}

.footer a{
    color:#3b82f6;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="brand">Aale AI PRO</div>
    <div class="status">● LIVE AI SYSTEM</div>
</div>

<div class="container">

    <!-- CONTROL -->
    <div class="control-panel">

        <label>عدد النقاط</label>
        <input type="number" id="points" value="20">

        <button onclick="generateData()">تشغيل التحليل</button>
        <button onclick="resetChart()">إعادة ضبط</button>
    </div>

    <!-- GRAPH -->
    <div class="graph-panel">

        <div id="chart"></div>

        <!-- AI OUTPUT -->
        <div class="ai-box">
            <div class="ai-title">AI Insight Engine</div>
            <div id="ai-text">في انتظار البيانات...</div>
        </div>

    </div>

</div>

<div class="footer">
    © 2026 Aale AI PRO — Built by 
    <a href="https://x.com/aale1164" target="_blank">@aale1164</a>
</div>

<script>

function generateData(){

    let points=document.getElementById("points").value;
    let x=[],y=[];

    for(let i=0;i<points;i++){
        x.push(i);
        y.push(Math.random()*100);
    }

    let data=[{
        x:x,
        y:y,
        type:'scatter',
        mode:'lines+markers',
        line:{color:'#3b82f6',width:3}
    }];

    let layout={
        paper_bgcolor:"transparent",
        plot_bgcolor:"transparent",
        font:{color:"white"}
    };

    Plotly.newPlot("chart",data,layout,{displayModeBar:false});

    // ================= AI ENGINE =================
    let avg = y.reduce((a,b)=>a+b)/y.length;
    let first = y[0];
    let last = y[y.length-1];

    let trend = last > first ? "📈 صاعد" : "📉 نازل";
    let strength = Math.abs(last - first);

    let volatility = 0;
    for(let i=1;i<y.length;i++){
        volatility += Math.abs(y[i]-y[i-1]);
    }

    volatility = (volatility / y.length).toFixed(2);

    let confidence = Math.min(100, (strength + avg/2)).toFixed(1);

    let msg = `
        📊 الاتجاه: <b>${trend}</b><br>
        📌 المتوسط: ${avg.toFixed(2)}<br>
        ⚡ قوة الحركة: ${strength.toFixed(2)}<br>
        📉 التذبذب: ${volatility}<br>
        🎯 ثقة AI: ${confidence}%
        <br><br>
        🤖 النظام يقوم بتحليل الأنماط وتقييم السلوك الرياضي للبيانات بشكل لحظي
    `;

    document.getElementById("ai-text").innerHTML = msg;
}

function resetChart(){
    document.getElementById("chart").innerHTML="";
    document.getElementById("ai-text").innerHTML="تم إعادة الضبط";
}

generateData();

</script>

</body>
</html>
