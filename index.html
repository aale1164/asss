<!-- الجزء الخاص بمحرر الأكواد فقط تم تعديله داخل الكود الكامل (سأعرضه مختصراً) -->
<!-- داخل modal editorModal -->
<div class="modal-overlay" id="editorModal">
  <div class="modal-container" style="max-width:900px;">
    <div class="modal-header"><h3><i class="fas fa-code"></i> محرر الأكواد المباشر</h3><i class="fas fa-times" id="closeEditorModal"></i></div>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <button class="btn btn-outline tab-btn active" data-lang="html">🟠 HTML/CSS/JS</button>
      <button class="btn btn-outline tab-btn" data-lang="python">🐍 بايثون</button>
      <button class="btn btn-outline" id="runCodeBtn"><i class="fas fa-play"></i> تنفيذ</button>
      <button class="btn btn-outline" id="clearEditorBtn"><i class="fas fa-eraser"></i> مسح</button>
    </div>
    <textarea class="code-editor-textarea" id="codeEditor"></textarea>
    <div id="outputArea" style="background:#0f1a2b;color:#fff;padding:15px;border-radius:16px;margin-top:10px;display:none;font-family:monospace;"></div>
    <iframe id="previewFrame" class="preview-iframe" style="display:none;"></iframe>
  </div>
</div>
<script>
  // الكود الخاص بالمحرر مع دعم بايثون (محاكي)
  (function(){
    const editorTextarea = document.getElementById('codeEditor');
    const previewFrame = document.getElementById('previewFrame');
    const outputDiv = document.getElementById('outputArea');
    const runBtn = document.getElementById('runCodeBtn');
    const clearBtn = document.getElementById('clearEditorBtn');
    const tabBtns = document.querySelectorAll('#editorModal .tab-btn[data-lang]');
    let currentLang = 'html'; // default

    // المحتوى الافتراضي عند فتح HTML
    const defaultHTML = `<!DOCTYPE html>
<html>
<head><style>body{font-family:'Tajawal',sans-serif;text-align:center;padding:50px;}</style></head>
<body>
  <h1 style="color:#3b82f6;">مرحبا بك هذا الكود برمجة وتطوير عدنااني</h1>
  <p>جرب كتابة أكواد HTML/CSS/JS هنا</p>
</body>
</html>`;
    const defaultPython = `# بايثون بسيط للمبتدئين
print("مرحبا بك هذا الكود برمجة وتطوير عدنااني")
x = 10
y = 20
print("المجموع:", x + y)
for i in range(3):
    print("عدنااني", i+1)
`;

    editorTextarea.value = defaultHTML;
    previewFrame.srcdoc = defaultHTML;
    outputDiv.style.display = 'none';
    previewFrame.style.display = 'block';

    // تبديل التبويبات
    tabBtns.forEach(btn => {
      btn.addEventListener('click', function(){
        tabBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentLang = this.dataset.lang;
        if(currentLang === 'html'){
          editorTextarea.value = defaultHTML;
          previewFrame.style.display = 'block';
          outputDiv.style.display = 'none';
          previewFrame.srcdoc = editorTextarea.value;
        } else {
          editorTextarea.value = defaultPython;
          previewFrame.style.display = 'none';
          outputDiv.style.display = 'none';
        }
      });
    });

    // تنفيذ الكود
    runBtn.addEventListener('click', function(){
      if(currentLang === 'html'){
        previewFrame.srcdoc = editorTextarea.value;
        previewFrame.style.display = 'block';
        outputDiv.style.display = 'none';
      } else {
        // محاكي بايثون بسيط
        previewFrame.style.display = 'none';
        outputDiv.style.display = 'block';
        const code = editorTextarea.value;
        try {
          // معالجة بسيطة لـ print والمتغيرات (محاكاة تعليمية)
          let output = '';
          const lines = code.split('\n');
          const variables = {};
          // دالة مساعدة لتقييم تعابير بسيطة
          function evalSimple(expr) {
            // استبدال أسماء المتغيرات
            for(const v in variables) expr = expr.replace(new RegExp('\\b'+v+'\\b','g'), variables[v]);
            return Function('"use strict"; return (' + expr + ')')();
          }
          for(let line of lines){
            line = line.trim();
            if(line.startsWith('print(') && line.endsWith(')')){
              const inner = line.slice(6,-1).split(',').map(s=>s.trim());
              const vals = inner.map(s=>{
                if(s.startsWith('"')||s.startsWith("'")) return s.slice(1,-1);
                return evalSimple(s);
              });
              output += vals.join(' ') + '\n';
            } else if(line.includes('=') && !line.startsWith('for') && !line.startsWith('if')){
              const [varName, ...rest] = line.split('=');
              const expr = rest.join('=').trim();
              if(varName.trim() && expr){
                variables[varName.trim()] = evalSimple(expr);
              }
            } else if(line.startsWith('for') && line.includes('in range(')){
              // دعم بسيط للتكرار
              const match = line.match(/for\s+(\w+)\s+in\s+range\((\d+)\)/);
              if(match){
                const loopVar = match[1];
                const count = parseInt(match[2]);
                for(let i=0; i<count; i++){
                  variables[loopVar] = i;
                  // نبحث عن السطر التالي داخل الكتلة (بسيط)
                  const nextLine = lines[lines.indexOf(line)+1]?.trim();
                  if(nextLine && nextLine.startsWith('print(')){
                    // نفذ الطباعة مع استبدال المتغير
                    let printLine = nextLine;
                    for(const v in variables) printLine = printLine.replace(new RegExp('\\b'+v+'\\b','g'), variables[v]);
                    const inner = printLine.slice(6,-1).split(',').map(s=>s.trim());
                    const vals = inner.map(s=>{
                      if(s.startsWith('"')||s.startsWith("'")) return s.slice(1,-1);
                      return evalSimple(s);
                    });
                    output += vals.join(' ') + '\n';
                  }
                }
              }
            }
          }
          outputDiv.innerHTML = '<pre style="margin:0;">' + (output || 'لا يوجد مخرجات') + '</pre>';
        } catch(e){
          outputDiv.innerHTML = '<pre style="color:#f87171; margin:0;">خطأ: ' + e.message + '</pre>';
        }
      }
    });

    clearBtn.addEventListener('click', function(){
      if(currentLang === 'html'){
        editorTextarea.value = '';
        previewFrame.srcdoc = '';
      } else {
        editorTextarea.value = '';
        outputDiv.innerHTML = '';
      }
    });

    // فتح/إغلاق المودال (كما هو مع باقي المودالات)
    // ... باقي الأكواد ...
  })();
</script>
