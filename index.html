<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aale Analytics Pro</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body {
    margin: 0;
    font-family: 'Arial';
    background: radial-gradient(circle at top, #111827, #0b0f19);
    color: white;
}

/* ================= TOP BAR ================= */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 18px 30px;
    background: rgba(17, 24, 39, 0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.brand {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #60a5fa;
}

.status {
    color: #10b981;
    font-weight: bold;
}

/* ================= LAYOUT ================= */
.container {
    display: flex;
    height: calc(100vh - 120px);
}

/* ================= CONTROL PANEL ================= */
.control-panel {
    width: 25%;
    padding: 20px;
    background: rgba(31, 41, 55, 0.7);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(255,255,255,0.1);
    overflow-y: auto;
}

.control-panel h3 {
    margin-top: 0;
    color: #60a5fa;
}

/* inputs */
input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin: 10px 0;
    background: #111827;
    color: white;
}

/* buttons */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 25px rgba(59,130,246,0.3);
}

/* ================= GRAPH ================= */
.graph-panel {
    width: 75%;
    padding: 20px;
}

/* ================= FOOTER ================= */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 12px;
    background: rgba(17,24,39,0.8);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.1);
}

.footer a {
    color: #60a5fa;
    text-decoration: none;
    font-weight: bold;
}

.footer a:hover {
    color: #93c5fd;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="brand">Aale Analytics PRO</div>
    <div class="status">● LIVE SYSTEM</div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- CONTROL -->
    <div class="control-panel">
        <h3>Control Panel - لوحة التحكم</h3>

        <label>عدد النقاط</label>
        <input type="number" id="points" value="10">

        <button onclick="generateData()">تحديث البيانات</button>
        <button onclick="resetChart()">إعادة ضبط</button>
        <button onclick="exportImage()">تحميل الصورة</button>
    </div>

    <!-- GRAPH -->
    <div class="graph-panel">
        <div id="chart"></div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Aale Analytics PRO — Built by 
    <a href="https://x.com/aale1164" target="_blank">@aale1164</a>
</div>

<script>

function generateData() {
    let points = document.getElementById("points").value;
    let x = [];
    let y = [];

    for (let i = 0; i < points; i++) {
        x.push(i);
        y.push(Math.floor(Math.random() * 100));
    }

    let data = [{
        x: x,
        y: y,
        type: 'scatter',
        mode: 'lines+markers',
        line: {color: '#3b82f6'}
    }];

    let layout = {
        paper_bgcolor: "transparent",
        plot_bgcolor: "transparent",
        font: {color: "white"}
    };

    Plotly.newPlot('chart', data, layout);
}

function resetChart() {
    document.getElementById("chart").innerHTML = "";
}

function exportImage() {
    Plotly.downloadImage('chart', {format: 'png'});
}

generateData();

</script>

</body>
</html>
