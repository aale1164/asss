<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة آفاق | المساعد الذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  
  <style>
    /* تصميم الواجهة - Dark Premium */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: radial-gradient(circle at 20% 10%, #0b1424, #03070e);
      color: #fff; min-height: 100vh; padding: 0 15px 30px; direction: rtl;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 25px; margin: 15px 0;
      background: rgba(18, 28, 46, 0.7); backdrop-filter: blur(15px);
      border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 40px;
    }
    .brand { font-size: 1.4rem; font-weight: 800; color: #3b82f6; display: flex; align-items: center; gap: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .card {
      background: rgba(12, 22, 38, 0.8); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px; padding: 25px; text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2); }
    .image-wrapper { width: 65px; height: 65px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a5f, #0f1a2b); border-radius: 18px; font-size: 28px; color: #3b82f6; }
    
    /* تنسيق المودال */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-container { background: #08121e; border: 1px solid #3b82f6; border-radius: 30px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 30px; box-shadow: 0 0 50px rgba(59, 130, 246, 0.15); }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #1e3a5f; padding-bottom: 15px; }
    
    .form-group { margin-bottom: 18px; text-align: right; }
    .form-group label { display: block; margin-bottom: 8px; color: #a0c8ff; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #2e4a6b; background: #0b1424; color: white; font-family: 'Tajawal'; font-size: 1rem; transition: 0.3s;
    }
    .form-group input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    .btn { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 15px; border-radius: 35px; border: none; cursor: pointer; font-weight: 700; font-size: 1.1rem; width: 100%; transition: 0.3s; }
    .btn:hover { filter: brightness(1.1); transform: scale(1.02); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand"><i class="fas fa-layer-group"></i> منصة آفاق الذكية</div>
  <div style="font-weight: 600; color: #a0c8ff;"><i class="fas fa-shield-alt"></i> معالجة آمنة</div>
</div>

<div class="container">
  <div class="grid">
    <div class="card" onclick="openModal('atsModal')">
      <div class="image-wrapper"><i class="fas fa-file-invoice"></i></div>
      <h3>السيرة الذاتية</h3>
      <p style="font-size: 0.8rem; color: #9bb9f0; margin-top: 5px;">ATS Professional PDF</p>
    </div>
    
    <div class="card" onclick="openModal('photoModal')">
      <div class="image-wrapper"><i class="fas fa-user-circle"></i></div>
      <h3>صور الأحوال</h3>
      <p style="font-size: 0.8rem; color: #9bb9f0; margin-top: 5px;">مقاس 4×6 رسمي</p>
    </div>
    
    <div class="card" onclick="openModal('pdfModal')">
      <div class="image-wrapper"><i class="fas fa-file-pdf"></i></div>
      <h3>دمج PDF</h3>
      <p style="font-size: 0.8rem; color: #9bb9f0; margin-top: 5px;">دمج المستندات والصور</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="atsModal">
  <div class="modal-container">
    <div class="modal-header"><h3><i class="fas fa-pen-nib"></i> إنشاء السيرة الذاتية</h3><i class="fas fa-times" onclick="closeModal('atsModal')" style="cursor:pointer;"></i></div>
    <div class="form-group"><label>الاسم الرباعي</label><input type="text" id="cv_name" placeholder="عالى سعدون الرشيدي"></div>
    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex:1;"><label>الجوال</label><input type="text" id="cv_phone" placeholder="05xxxxxxxx"></div>
        <div class="form-group" style="flex:1;"><label>الايميل</label><input type="text" id="cv_email" placeholder="example@gmail.com"></div>
    </div>
    <div class="form-group"><label>النبذة التعريفية</label><textarea id="cv_summary" rows="3" placeholder="متخصص في الذكاء الاصطناعي..."></textarea></div>
    <div class="form-group"><label>المؤهلات والخبرات</label><textarea id="cv_details" rows="5" placeholder="اذكر خبراتك هنا..."></textarea></div>
    <div class="form-group">
        <label>لغة الملف والخط</label>
        <select id="cv_lang"><option value="ar">العربية (Tajawal)</option><option value="en">English (Inter)</option></select>
    </div>
    <button class="btn" onclick="generateCV()"><i class="fas fa-download"></i> تصدير السيرة الذاتية بجودة عالية</button>
  </div>
</div>

<script>
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // تحسين جودة الخط في السيرة الذاتية
    async function generateCV() {
        const btn = document.querySelector('#atsModal .btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري معالجة الخطوط...';
        
        const data = {
            name: document.getElementById('cv_name').value || 'عالى سعدون الرشيدي',
            phone: document.getElementById('cv_phone').value || '0500366631',
            email: document.getElementById('cv_email').value || 'a1047874118@gmail.com',
            summary: document.getElementById('cv_summary').value || 'متخصص في الذكاء الاصطناعي التوليدي',
            details: document.getElementById('cv_details').value || 'منشئ موقع متكامل',
            lang: document.getElementById('cv_lang').value
        };

        const tempDiv = document.createElement('div');
        tempDiv.style.width = '800px';
        tempDiv.style.padding = '50px';
        tempDiv.style.background = 'white';
        tempDiv.style.color = '#1a202c';
        tempDiv.style.direction = data.lang === 'ar' ? 'rtl' : 'ltr';
        tempDiv.style.fontFamily = data.lang === 'ar' ? "'Tajawal', sans-serif" : "'Inter', sans-serif";
        tempDiv.style.webkitFontSmoothing = "antialiased";

        tempDiv.innerHTML = `
            <div style="text-align:center; border-bottom: 3px solid #3b82f6; padding-bottom: 20px; margin-bottom: 30px;">
                <h1 style="font-size: 32px; font-weight: 800; color: #1e3a8a; letter-spacing: -0.5px; margin-bottom: 10px;">${data.name}</h1>
                <p style="font-size: 14px; color: #4a5568; font-weight: 500;">${data.phone} | ${data.email}</p>
            </div>
            <div style="margin-bottom: 25px;">
                <h3 style="background:#eff6ff; padding:8px 15px; color:#1e40af; border-right: 5px solid #3b82f6; font-size: 18px; font-weight: 700;">${data.lang === 'ar' ? 'النبذة التعريفية' : 'Professional Summary'}</h3>
                <p style="margin-top:12px; line-height: 1.8; font-size: 15px; color: #2d3748; font-weight: 500;">${data.summary}</p>
            </div>
            <div style="margin-top: 25px;">
                <h3 style="background:#eff6ff; padding:8px 15px; color:#1e40af; border-right: 5px solid #3b82f6; font-size: 18px; font-weight: 700;">${data.lang === 'ar' ? 'المؤهلات والخبرات' : 'Experience & Education'}</h3>
                <div style="margin-top:12px; line-height: 1.8; font-size: 15px; color: #2d3748; white-space: pre-wrap; font-weight: 500;">${data.details}</div>
            </div>
        `;

        document.body.appendChild(tempDiv);
        
        // Scale 4 لضمان أعلى دقة ممكنة للخطوط
        const canvas = await html2canvas(tempDiv, { scale: 4, useCORS: true, backgroundColor: '#ffffff' });
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297, undefined, 'FAST');
        pdf.save(`CV_${data.name.replace(/\s+/g, '_')}.pdf`);
        
        document.body.removeChild(tempDiv);
        btn.innerHTML = '<i class="fas fa-download"></i> تصدير السيرة الذاتية بجودة عالية';
    }

    // إضافة وظائف صور الأحوال والـ PDF كما في الكود السابق مع تحسين التصدير
</script>
</body>
</html>
