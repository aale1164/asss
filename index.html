<script>
/* ================= MODALS ================= */
function openModal(id) {
  document.getElementById(id).style.display = 'flex';
}
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// إغلاق عند الضغط خارج المودال
document.querySelectorAll('.modal-overlay').forEach(modal => {
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
  });
});

/* ================= CV ================= */
async function generateCV() {
  const { jsPDF } = window.jspdf;

  const name = document.getElementById('cv_name').value || "بدون اسم";
  const phone = document.getElementById('cv_phone').value || "-";
  const email = document.getElementById('cv_email').value || "-";
  const summary = document.getElementById('cv_summary').value || "-";
  const details = document.getElementById('cv_details').value || "-";
  const lang = document.getElementById('cv_lang').value;

  const tempDiv = document.createElement('div');
  tempDiv.style.width = '700px';
  tempDiv.style.padding = '40px';
  tempDiv.style.background = 'white';
  tempDiv.style.color = 'black';
  tempDiv.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
  tempDiv.style.fontFamily = "Tajawal";

  tempDiv.innerHTML = `
    <h1 style="text-align:center">${name}</h1>
    <p style="text-align:center">${phone} | ${email}</p>
    <hr>
    <h3>${lang === 'ar' ? 'النبذة' : 'Summary'}</h3>
    <p>${summary}</p>
    <h3>${lang === 'ar' ? 'الخبرات' : 'Experience'}</h3>
    <p style="white-space:pre-wrap">${details}</p>
  `;

  document.body.appendChild(tempDiv);

  const canvas = await html2canvas(tempDiv, { scale: 2 });
  const imgData = canvas.toDataURL('image/png');

  const pdf = new jsPDF();
  pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
  pdf.save('CV.pdf');

  document.body.removeChild(tempDiv);
}

/* ================= PHOTO ================= */
function previewPhoto(input) {
  if (!input.files.length) return;

  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('targetPhoto').src = e.target.result;
    document.getElementById('photoPreviewBox').style.display = 'block';
    document.getElementById('savePhotoBtn').style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

function processAndDownloadPhoto() {
  const img = document.getElementById('targetPhoto');

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 600;
  canvas.height = 900;

  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const scale = Math.max(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight);

  const x = (canvas.width - img.naturalWidth * scale) / 2;
  const y = (canvas.height - img.naturalHeight * scale) / 2;

  ctx.drawImage(img, x, y, img.naturalWidth * scale, img.naturalHeight * scale);

  const link = document.createElement('a');
  link.download = 'photo.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
}

/* ================= PDF ================= */
let selectedPdfFiles = [];

function handlePdfFiles(input) {
  selectedPdfFiles = Array.from(input.files);

  const list = document.getElementById('pdfList');
  list.innerHTML = '';

  selectedPdfFiles.forEach((file, i) => {
    const div = document.createElement('div');
    div.className = 'image-item';
    div.dataset.index = i;
    div.innerHTML = `<i class="fas fa-image"></i> ${file.name}`;
    list.appendChild(div);
  });

  if (selectedPdfFiles.length)
    document.getElementById('generatePdfBtn').style.display = 'block';

  new Sortable(list, {
    animation: 150,
    onEnd: () => {
      const newOrder = [];
      document.querySelectorAll('#pdfList .image-item').forEach(el => {
        newOrder.push(selectedPdfFiles[el.dataset.index]);
      });
      selectedPdfFiles = newOrder;
    }
  });
}

async function buildFinalPdf() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  for (let i = 0; i < selectedPdfFiles.length; i++) {
    const file = selectedPdfFiles[i];

    const imgData = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });

    if (i > 0) pdf.addPage();

    const width = pdf.internal.pageSize.getWidth();
    const height = pdf.internal.pageSize.getHeight();

    pdf.addImage(imgData, 'JPEG', 0, 0, width, height);
  }

  pdf.save('merged.pdf');
}
</script>
