<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة آفاق | Pro Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    /* جميع الأنماط كما هي دون تغيير */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: radial-gradient(circle at 20% 10%, #0b1424, #03070e);
      color: #fff;
      min-height: 100vh;
      padding: 0 11px 22px;
      direction: rtl;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 20px; margin: 14px 0 7px;
      background: rgba(18, 28, 46, 0.6); backdrop-filter: blur(12px);
      border: 1px solid rgba(74, 144, 226, 0.2); border-radius: 42px;
      box-shadow: 0 10px 24px -7px rgba(0,0,0,0.5);
    }
    .brand {
      font-size: 1.25rem; font-weight: 800;
      background: linear-gradient(135deg, #a0c8ff, #3b82f6);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(59,130,246,0.2); padding: 6px 13px; border-radius: 28px;
      border: 1px solid rgba(59,130,246,0.4); font-weight: 600; font-size: 0.7rem; color: #bdd3ff;
    }
    .live-badge i { color: #3b82f6; font-size: 0.6rem; animation: pulse 1.8s infinite; }
    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); text-shadow: 0 0 6px #3b82f6; }
      100% { opacity: 0.6; transform: scale(1); }
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      margin: 21px 0 14px;
    }
    .card {
      background: rgba(12, 22, 38, 0.7); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
      padding: 17px 8px 14px; display: flex; flex-direction: column; align-items: center;
      text-align: center; cursor: pointer; transition: all 0.3s;
      box-shadow: 0 7px 14px -3px rgba(0,0,0,0.5); position: relative; overflow: hidden;
    }
    .card::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(59,130,246,0.25), transparent 70%);
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    .card:hover { transform: translateY(-6px); background: rgba(20,40,65,0.8); border-color: rgba(59,130,246,0.5); }
    .card:hover::after { opacity: 1; }
    .image-wrapper {
      width: 63px; height: 63px; margin-bottom: 11px; display: flex; align-items: center; justify-content: center;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      background: linear-gradient(145deg, rgba(59,130,246,0.2), rgba(16,30,54,0.7));
      box-shadow: 0 7px 14px -3px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card:hover .image-wrapper { background: linear-gradient(145deg, #1e3a6b, #0f1e32); box-shadow: 0 0 13px #3b82f6; }
    .image-wrapper i { font-size: 32px; color: #e0edff; }
    .card-title { font-size: 0.9rem; font-weight: 700; margin: 6px 0 4px; color: #f0f6ff; }
    .card-stat { font-size: 0.7rem; color: #9bb9f0; background: rgba(0,0,0,0.2); padding: 3px 10px; border-radius: 21px; }
    .footer {
      text-align: center; padding: 17px 0 7px; opacity: 0.75; font-size: 0.7rem;
      color: #b0c7e9; border-top: 1px dashed rgba(100,150,220,0.2); margin-top: 18px;
    }
    .footer a {
      color: #a0c8ff;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .footer a:hover {
      color: #3b82f6;
      text-shadow: 0 0 8px #3b82f6;
    }
    .modal-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-container {
      background: rgba(8,18,30,0.95); backdrop-filter: blur(20px); border: 1px solid #3b82f6;
      border-radius: 32px; width: 100%; max-width: 800px; max-height: 90vh;
      overflow-y: auto; padding: 24px; box-shadow: 0 30px 50px rgba(0,0,0,0.7);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; border-bottom: 1px solid #2a3c58; padding-bottom: 12px;
    }
    .modal-header h3 { font-size: 1.5rem; color: #a0c8ff; }
    .modal-header i { font-size: 24px; color: #60a5fa; cursor: pointer; }
    .upload-area {
      border: 2px dashed #3b82f6; border-radius: 24px; padding: 20px;
      text-align: center; background: rgba(20,35,55,0.5); cursor: pointer;
      margin-bottom: 20px; transition: 0.2s;
    }
    .upload-area:hover { background: rgba(59,130,246,0.1); border-color: #90c0ff; }
    .upload-area i { font-size: 40px; color: #3b82f6; margin-bottom: 10px; }
    .preview-image {
      max-width: 100%; max-height: 250px; border-radius: 16px; margin: 15px 0; border: 2px solid #3b82f6;
    }
    .requirements-box {
      background: #0f1a2b; border-radius: 20px; padding: 18px; margin: 20px 0; font-size: 0.9rem;
    }
    .req-item {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .req-item i { width: 20px; color: #fbbf24; }
    .status-badge {
      padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; background: #1e3a5f; margin-right: auto;
    }
    .btn {
      background: #3b82f6; border: none; color: white; padding: 12px 24px;
      border-radius: 40px; font-weight: 600; cursor: pointer; margin: 5px;
      border: 1px solid #90c0ff; transition: 0.2s;
    }
    .btn-outline { background: transparent; border: 1px solid #3b82f6; }
    .btn:hover { background: #2563eb; box-shadow: 0 0 15px #3b82f6; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; background: #1e3a5f; box-shadow: none; }
    .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .image-list {
      display: flex; flex-direction: column; gap: 10px; margin: 20px 0;
      max-height: 300px; overflow-y: auto;
    }
    .image-item {
      display: flex; align-items: center; background: #0f1a2b; border-radius: 16px;
      padding: 10px 15px; border: 1px solid #2e4a6b; cursor: grab;
    }
    .image-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; margin-left: 15px; }
    .sortable-ghost { opacity: 0.4; background: #1e3a5f; }
    .warning-text { color: #facc15; font-size: 0.8rem; margin-top: 5px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #b0cdff; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px; border-radius: 16px; border: 1px solid #2e4a6b;
      background: #0f1a2b; color: white; font-family: 'Tajawal';
    }
    .form-row { display: flex; gap: 10px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand"><i class="fas fa-cube" style="margin-left: 7px; color: #3b82f6;"></i> منصة آفاق | Pro</div>
  <div class="live-badge"><i class="fas fa-circle"></i> نظام مباشر · LIVE <i class="fas fa-shield-alt" style="margin-right: 6px;"></i></div>
</div>

<div class="container">
  <div class="grid">
    <div class="card"><div class="image-wrapper"><i class="fas fa-chart-pie"></i></div><div class="card-title">تحليل بيانات</div><div class="card-stat">+٢٤ تقرير</div></div>
    
    <div class="card" id="openAtsModalBtn">
      <div class="image-wrapper"><i class="fas fa-file-alt"></i></div>
      <div class="card-title">إنشاء سيرة ذاتية</div>
      <div class="card-stat">ATS احترافية</div>
    </div>
    
    <div class="card" id="openPhotoModalBtn">
      <div class="image-wrapper"><i class="fas fa-id-card"></i></div>
      <div class="card-title">تعديل صور الأحوال</div>
      <div class="card-stat">4×6 آمن</div>
    </div>
    
    <div class="card" id="openPdfModalBtn">
      <div class="image-wrapper"><i class="fas fa-file-pdf"></i></div>
      <div class="card-title">تحويل الصور إلى PDF</div>
      <div class="card-stat">دمج + ترتيب</div>
    </div>
    
    <div class="card"><div class="image-wrapper"><i class="fas fa-network-wired"></i></div><div class="card-title">شبكة</div><div class="card-stat">٥.٢ جيجابت/ث</div></div>
    <div class="card"><div class="image-wrapper"><i class="fas fa-satellite-dish"></i></div><div class="card-title">بيانات مباشرة</div><div class="card-stat">تحديث كل ٣ ثوان</div></div>
    <div class="card"><div class="image-wrapper"><i class="fas fa-coins"></i></div><div class="card-title">مالية</div><div class="card-stat">$١٢.٤ مليار</div></div>
    <div class="card"><div class="image-wrapper"><i class="fas fa-database"></i></div><div class="card-title">تخزين</div><div class="card-stat">٧٨٪ مستخدم</div></div>
  </div>
  <!-- تم تعديل الفوتر هنا -->
  <div class="footer">
    <span style="font-weight: 800; background: linear-gradient(135deg, #a0c8ff, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent;">آفاق</span> · 
    © 2026 — تصميم <span style="color: #fbbf24;">عـدنـانـي</span> · 
    <a href="https://twitter.com/aale1164" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-twitter" style="margin:0 4px;"></i>@aale1164
    </a>
  </div>
</div>
