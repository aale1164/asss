<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الأدوات الذكية</title>

<!-- Plotly -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}
.container{
    width:90%;
    margin:auto;
}
.card{
    background:#1e293b;
    padding:20px;
    margin:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}
button{
    background:#3b82f6;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
input{
    padding:10px;
    border-radius:10px;
    border:none;
}
#chart{
    height:300px;
}
canvas{
    background:white;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 منصة أدوات ذكية</h1>

<!-- 📊 تحليل البيانات -->
<div class="card">
<h2>📊 تحليل بيانات لحظي</h2>
<input id="points" type="number" value="20">
<button onclick="generateData()">تشغيل</button>
<div id="chart"></div>
<p id="ai-text"></p>
</div>

<!-- 📄 PDF -->
<div class="card">
<h2>📄 تحويل صور إلى PDF</h2>
<input type="file" id="images" multiple>
<button onclick="convertToPDF()">تحويل</button>
</div>

<!-- 🧾 CV -->
<div class="card">
<h2>🧾 إنشاء CV PDF</h2>
<button onclick="generateResume()">إنشاء</button>
</div>

<!-- 🖼️ صورة أحوال -->
<div class="card">
<h2>🖼️ تجهيز صورة 4×6</h2>
<input type="file" id="photo">
<button onclick="processPhoto()">تحويل</button>
<br><br>
<canvas id="canvas" width="400" height="600"></canvas>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;

/* ================= تحليل البيانات ================= */
function generateData(){
    let points = document.getElementById("points").value;

    let x=[], y=[];
    for(let i=0;i<points;i++){
        x.push(i);
        y.push(Math.random()*100);
    }

    Plotly.newPlot("chart", [{
        x:x,
        y:y,
        type:'scatter',
        mode:'lines+markers'
    }]);

    let avg = y.reduce((a,b)=>a+b)/y.length;
    let trend = y[y.length-1] > y[0] ? "📈 صاعد" : "📉 نازل";
    let strength = Math.abs(y[y.length-1]-y[0]);

    document.getElementById("ai-text").innerText =
    "الاتجاه: "+trend+"\n"+
    "المتوسط: "+avg.toFixed(2)+"\n"+
    "قوة الحركة: "+strength.toFixed(2);
}

/* تشغيل تلقائي */
setInterval(generateData,1000);

/* ================= PDF ================= */
function convertToPDF(){
    let files = document.getElementById("images").files;
    if(files.length === 0) return alert("اختر صور");

    let pdf = new jsPDF();

    Array.from(files).forEach((file,i)=>{
        let reader = new FileReader();
        reader.onload = function(e){
            let img = new Image();
            img.onload = function(){

                let w = pdf.internal.pageSize.getWidth();
                let h = (img.height * w)/img.width;

                if(i>0) pdf.addPage();

                let format = file.type.includes('png') ? 'PNG' : 'JPEG';
                pdf.addImage(e.target.result, format, 0, 0, w, h);

                if(i === files.length-1){
                    pdf.save("images.pdf");
                }
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    });
}

/* ================= CV ================= */
function generateResume(){
    let pdf = new jsPDF();

    pdf.setFontSize(20);
    pdf.text("السيرة الذاتية", 80, 20);

    pdf.setFontSize(12);
    pdf.text("الاسم: عالي سعدون", 20, 40);
    pdf.text("خبرة: أمن + AI", 20, 50);

    pdf.save("cv.pdf");
}

/* ================= صورة أحوال ================= */
function processPhoto(){
    let file = document.getElementById("photo").files[0];
    if(!file) return alert("اختر صورة");

    let reader = new FileReader();
    reader.onload = function(e){

        let img = new Image();
        img.onload = function(){

            let canvas = document.getElementById("canvas");
            let ctx = canvas.getContext("2d");

            // مقاس 4x6 حقيقي
            const dpi = 300;
            const w = Math.round((4/2.54)*dpi);
            const h = Math.round((6/2.54)*dpi);

            canvas.width = w;
            canvas.height = h;

            // قص مركزي
            let size = Math.min(img.width,img.height);
            let sx = (img.width-size)/2;
            let sy = (img.height-size)/2;

            ctx.drawImage(img, sx, sy, size, size, 0, 0, w, h);
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
