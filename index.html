<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #0f172a, #0b0f19);
    color:white;
}

/* ================= TOP BAR ================= */
.topbar{
    display:flex;
    justify-content:space-between;
    padding:18px 25px;
    background:rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.brand{
    font-size:20px;
    font-weight:bold;
    color:#3b82f6;
}

/* ================= GRID ================= */
.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:15px;
}

/* ================= CARD ================= */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

/* hover animation */
.card:hover{
    transform:translateY(-5px);
    background:rgba(59,130,246,0.15);
    box-shadow:0 10px 25px rgba(59,130,246,0.2);
}

/* glow animation */
.card::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 60%);
    transform:rotate(25deg);
    opacity:0;
    transition:0.4s;
}

.card:hover::before{
    opacity:1;
}

/* icon */
.icon{
    font-size:30px;
    margin-bottom:10px;
}

/* footer */
.footer{
    text-align:center;
    padding:15px;
    margin-top:20px;
    opacity:0.7;
    font-size:14px;
}

</style>

</head>

<body>

<div class="topbar">
    <div class="brand">Aale Pro Dashboard</div>
    <div>● LIVE SYSTEM</div>
</div>

<div class="container">

    <div class="grid">

        <div class="card"><div class="icon">📊</div>تحليل بيانات</div>
        <div class="card"><div class="icon">🧠</div>ذكاء اصطناعي</div>
        <div class="card"><div class="icon">🗓️</div>تقويم هجري</div>
        <div class="card"><div class="icon">📈</div>إحصائيات</div>
        <div class="card"><div class="icon">⚙️</div>إعدادات</div>

        <div class="card"><div class="icon">🔐</div>حماية</div>
        <div class="card"><div class="icon">🌐</div>شبكة</div>
        <div class="card"><div class="icon">📡</div>بيانات مباشرة</div>
        <div class="card"><div class="icon">💰</div>مالية</div>
        <div class="card"><div class="icon">📦</div>تخزين</div>

    </div>

    <div class="footer">
        © 2026 Pro Dashboard — Ready for expansion 🚀
    </div>

</div>

</body>
</html>
